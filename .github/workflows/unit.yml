name: Build

on:
  push:
    branches:
      - main
  pull_request:

env:
  PYTHONNOUSERSITE: "1"
  JUPYTER_PLATFORM_DIRS: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    env:
      # Inject EE creds when triggered by push or by a same-repo PR. Forks see ''.
      EARTHENGINE_TOKEN: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && secrets.EARTHENGINE_TOKEN || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3
        with:
          activate-environment: seplan
          auto-activate-base: false
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: pytest tests/ --import-mode=importlib
